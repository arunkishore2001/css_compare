<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS & JS Tools Hub</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #3F934C, #3468AD);
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
            background: #ffffff;
            color: #333;
        }

        .btn:hover {
            background: linear-gradient(135deg, #3F934C, #3468AD);
            color: #fff;
            transform: scale(1.05);
        }

</head>
