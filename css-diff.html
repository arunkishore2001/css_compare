<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional CSS Diff Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
    background: #1e1e1e;
    color: #fff;
}

header {
    padding: 15px;
    text-align: center;
    background: linear-gradient(90deg,#3F934C,#3468AD);
    font-size: 18px;
    font-weight: bold;
}

.controls {
    padding: 10px;
    text-align: center;
    background: #252526;
}

.controls label {
    margin-right: 15px;
}

button {
    padding: 8px 20px;
    margin: 5px;
    border: none;
    cursor: pointer;
    background: #3F934C;
    color: #fff;
    border-radius: 5px;
}

.container {
    display: flex;
    height: 400px;
}

textarea {
    width: 50%;
    padding: 15px;
    border: none;
    outline: none;
    resize: none;
    font-family: Consolas, monospace;
    font-size: 14px;
    background: #1e1e1e;
    color: #fff;
}

.diff-container {
    display: flex;
    height: 400px;
    border-top: 1px solid #333;
}

.diff-box {
    width: 50%;
    padding: 15px;
    overflow: auto;
    white-space: pre-wrap;
    border-right: 1px solid #333;
}

.added { background: #144212; }
.removed { background: #5a1d1d; }
.changed { background: #5c3d00; }

footer {
    padding: 10px;
    text-align: center;
    background: #252526;
}
</style>
</head>
<body>

<header>Professional CSS Compare Tool</header>

<div class="controls">
    <label><input type="checkbox" id="ignoreSpace" checked> Ignore Whitespace</label>
    <label><input type="checkbox" id="ignoreOrder" checked> Ignore Order</label>
    <button onclick="compare()">Compare</button>
    <button onclick="downloadReport()">Download Report</button>
</div>

<div class="container">
    <textarea id="left" placeholder="Paste Left CSS here..."></textarea>
    <textarea id="right" placeholder="Paste Right CSS here..."></textarea>
</div>

<div class="diff-container">
    <div class="diff-box" id="leftDiff"></div>
    <div class="diff-box" id="rightDiff"></div>
</div>

<footer>VS Code Style Diff Viewer</footer>

<script>

function normalizeCSS(css, ignoreSpace, ignoreOrder) {
    if (ignoreSpace) {
        css = css.replace(/\s+/g, ' ').trim();
    }

    if (!ignoreOrder) return css;

    const blocks = css.split('}');
    let result = [];

    blocks.forEach(block => {
        const parts = block.split('{');
        if (parts.length === 2) {
            const selector = parts[0].trim();
            const props = parts[1]
                .split(';')
                .map(p => p.trim())
                .filter(p => p)
                .sort()
                .join('; ');
            result.push(selector + " { " + props + " }");
        }
    });

    return result.sort().join('\n');
}

function compare() {
    const ignoreSpace = document.getElementById("ignoreSpace").checked;
    const ignoreOrder = document.getElementById("ignoreOrder").checked;

    let left = document.getElementById("left").value;
    let right = document.getElementById("right").value;

    const normLeft = normalizeCSS(left, ignoreSpace, ignoreOrder);
    const normRight = normalizeCSS(right, ignoreSpace, ignoreOrder);

    const leftLines = normLeft.split('\n');
    const rightLines = normRight.split('\n');

    const leftDiff = document.getElementById("leftDiff");
    const rightDiff = document.getElementById("rightDiff");

    leftDiff.innerHTML = "";
    rightDiff.innerHTML = "";

    const max = Math.max(leftLines.length, rightLines.length);

    for (let i = 0; i < max; i++) {
        const l = leftLines[i] || "";
        const r = rightLines[i] || "";

        const lDiv = document.createElement("div");
        const rDiv = document.createElement("div");

        lDiv.textContent = l;
        rDiv.textContent = r;

        if (l === r) {
            // same
        } else if (!l) {
            rDiv.classList.add("added");
        } else if (!r) {
            lDiv.classList.add("removed");
        } else {
            lDiv.classList.add("changed");
            rDiv.classList.add("changed");
        }

        leftDiff.appendChild(lDiv);
        rightDiff.appendChild(rDiv);
    }

    if (normLeft === normRight) {
        leftDiff.innerHTML = "<div style='color:#4CAF50'>Same CSS File</div>";
        rightDiff.innerHTML = "<div style='color:#4CAF50'>Same CSS File</div>";
    }
}

function downloadReport() {
    const left = document.getElementById("leftDiff").innerText;
    const right = document.getElementById("rightDiff").innerText;

    const content = "LEFT FILE:\n\n" + left + "\n\nRIGHT FILE:\n\n" + right;

    const blob = new Blob([content], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "css-diff-report.txt";
    link.click();
}

</script>

</body>
</html>
